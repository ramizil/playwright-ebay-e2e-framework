# =============================================================================
# E2E Framework Configuration
# =============================================================================
# Central configuration file for the eBay automation framework.
# Values here can be overridden by environment variables (see settings.py).

# Target site
base_url: "https://www.ebay.com"

# Timeouts (milliseconds)
timeouts:
  default: 15000        # Default wait for element visibility
  navigation: 30000     # Page navigation timeout
  action: 5000          # Click / fill / type timeout

# Retry behaviour for unstable environments
retry:
  max_attempts: 3       # Total tries per operation
  backoff_factor: 1.0   # Base delay in seconds (doubles each retry)
  jitter: true          # Add ±25% randomness to avoid thundering herd

# Browser profiles for parallel execution.
# Each name maps to a Playwright browser engine + optional channel.
# Supported profiles:
#   chromium       → Playwright's bundled Chromium (no channel)
#   firefox        → Playwright's bundled Firefox
#   webkit         → Playwright's bundled WebKit (Safari-like)
#   chrome         → Google Chrome stable  (chromium + channel: chrome)
#   chrome-beta    → Google Chrome beta    (chromium + channel: chrome-beta)
#   msedge         → Microsoft Edge stable (chromium + channel: msedge)
#   msedge-beta    → Microsoft Edge beta   (chromium + channel: msedge-beta)
browsers:
  - chromium
  - firefox
  - msedge
  # - webkit        # Safari/WebKit
  # - chrome        # Google Chrome stable
  # - chrome-beta   # Chrome beta channel

# Browser launch options
browser_options:
  headless: true
  slow_mo: 0            # Milliseconds of delay between actions (useful for demos)

# Viewport
viewport:
  width: 1920
  height: 1080

# Screenshot & tracing
screenshots:
  on_failure: true      # Capture screenshot when a test fails
  on_step: true         # Capture screenshot after key actions (add-to-cart)

tracing:
  enabled: true         # Record Playwright traces for failed tests
  screenshots: true
  snapshots: true

# Reporting
reporting:
  allure_results_dir: "allure-results"
  html_report_dir: "reports"

# Authentication (optional — set via env vars for security)
# When both username and password are provided, the test flow begins with
# a sign-in step.  Leave blank or omit to run without authentication.
# Env-var overrides: EBAY_USERNAME, EBAY_PASSWORD
credentials:
  username: ""          # eBay account email — prefer EBAY_USERNAME env var
  password: ""          # eBay account password — prefer EBAY_PASSWORD env var

# Logging
logging:
  level: "INFO"         # DEBUG for maximum verbosity
